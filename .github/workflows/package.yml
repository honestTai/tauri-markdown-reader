name: Package and Release Tauri app

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    name: Package ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            artifact-name: markdown-reader-windows-x64
            archive-macos: "false"
            build-command: npm run tauri:build
            bundle-path: |
              src-tauri/target/release/bundle/**/*.exe
              src-tauri/target/release/bundle/**/*.msi
          - name: macOS Apple Silicon
            os: macos-latest
            artifact-name: markdown-reader-macos-apple-silicon
            archive-macos: "true"
            archive-suffix: macos-apple-silicon
            build-command: npm run tauri:build -- --bundles app --no-sign
            bundle-path: |
              macos-bundle/*.tar.gz

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up pnpm
        run: npm install -g pnpm@10.24.0

      - name: Install dependencies
        env:
          PNPM_HOME: ${{ runner.temp }}/pnpm
        run: |
          pnpm --version
          pnpm install --frozen-lockfile

      - name: Build Tauri bundle
        run: ${{ matrix.build-command }}

      - name: Archive macOS app
        if: matrix.archive-macos == 'true'
        shell: bash
        run: |
          app_path=$(find src-tauri/target/release/bundle/macos -maxdepth 1 -name "*.app" -type d | head -n 1)
          if [ -z "$app_path" ]; then
            echo "No macOS .app bundle found."
            exit 1
          fi

          mkdir -p macos-bundle
          version="${GITHUB_REF_NAME#v}"
          tar -czf "macos-bundle/Markdown-Reader_${version}_${{ matrix.archive-suffix }}.app.tar.gz" -C "$(dirname "$app_path")" "$(basename "$app_path")"

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.bundle-path }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download packaged bundles
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          notes_file="docs/RELEASE_NOTES_${GITHUB_REF_NAME}.md"
          if [ -f "$notes_file" ]; then
            cp "$notes_file" RELEASE_NOTES.md
          else
            cat > RELEASE_NOTES.md <<NOTES
          Markdown Reader ${GITHUB_REF_NAME}

          See README.md and CHANGELOG.md for release details.
          NOTES
          fi

          mapfile -t assets < <(find release-assets -type f | sort)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets found."
            exit 1
          fi

          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --clobber
            gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --title "Markdown Reader $GITHUB_REF_NAME" --notes-file RELEASE_NOTES.md --latest
          else
            gh release create "$GITHUB_REF_NAME" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --title "Markdown Reader $GITHUB_REF_NAME" --notes-file RELEASE_NOTES.md --latest
          fi
