name: Package and Release Tauri app

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    name: Package ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            artifact-name: markdown-reader-windows-x64
            archive-macos: "false"
            build-command: npm run tauri:build
            bundle-path: |
              src-tauri/target/release/bundle/**/*.exe
              src-tauri/target/release/bundle/**/*.msi
          - name: macOS Intel
            os: macos-15-intel
            artifact-name: markdown-reader-macos-intel
            archive-macos: "true"
            archive-suffix: macos-intel
            build-command: npm run tauri:build -- --bundles app --no-sign
            bundle-path: |
              macos-bundle/*.tar.gz
          - name: macOS Apple Silicon
            os: macos-latest
            artifact-name: markdown-reader-macos-apple-silicon
            archive-macos: "true"
            archive-suffix: macos-apple-silicon
            build-command: npm run tauri:build -- --bundles app --no-sign
            bundle-path: |
              macos-bundle/*.tar.gz

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up pnpm
        run: npm install -g pnpm@10.24.0

      - name: Install dependencies
        env:
          PNPM_HOME: ${{ runner.temp }}/pnpm
        run: |
          pnpm --version
          pnpm install --frozen-lockfile

      - name: Build Tauri bundle
        run: ${{ matrix.build-command }}

      - name: Archive macOS app
        if: matrix.archive-macos == 'true'
        shell: bash
        run: |
          app_path=$(find src-tauri/target/release/bundle/macos -maxdepth 1 -name "*.app" -type d | head -n 1)
          if [ -z "$app_path" ]; then
            echo "No macOS .app bundle found."
            exit 1
          fi

          mkdir -p macos-bundle
          version="${GITHUB_REF_NAME#v}"
          tar -czf "macos-bundle/Markdown-Reader_${version}_${{ matrix.archive-suffix }}.app.tar.gz" -C "$(dirname "$app_path")" "$(basename "$app_path")"

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.bundle-path }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged bundles
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          cat > RELEASE_NOTES.md <<'NOTES'
          ## 中文

          Markdown Reader v0.1.3 继续打磨本地 Markdown 阅读、编辑和导出体验，并补齐中英文界面。

          ### 新增与改进

          - 新增中英文界面切换，覆盖操作按钮、右侧面板、样式选择和常见提示。
          - README 新增中文 / 英文两张产品截图，方便快速了解界面。
          - Markdown 样式预设补充英文名称，英文界面下展示更自然。
          - 继续保留本地优先工作流：打开文件夹或单个 Markdown 文件、插入本地图片、大纲跳转、Word/PDF/HTML 导出。
          - Word 和 PDF 导出继续支持图片，并内置中文 PDF 字体，不依赖用户额外安装转换器。

          - Windows x64: `.exe` 和 `.msi`
          - macOS Intel: `.app.tar.gz`
          - macOS Apple Silicon: `.app.tar.gz`

          macOS 版本未做 Apple 签名和公证时，首次打开可能需要在 Finder 中右键应用并选择“打开”。

          ## English

          Markdown Reader v0.1.3 keeps refining the local Markdown reader, editor, and exporter experience with a cleaner bilingual interface.

          ### Added and changed

          - Add Chinese / English UI switching for operation buttons, panels, style labels, and common notices.
          - Add README screenshots for both Chinese and English UI.
          - Add English names for Markdown style presets.
          - Keep the local-first workflow: open a folder or one Markdown file, insert local images, use outline navigation, and export Word/PDF/HTML.
          - Keep image support in Word/PDF exports and bundled Chinese PDF font support without requiring external converters.

          - Windows x64: `.exe` and `.msi`
          - macOS Intel: `.app.tar.gz`
          - macOS Apple Silicon: `.app.tar.gz`

          If the macOS build is not Apple-signed or notarized, first launch may require right-clicking the app in Finder and choosing "Open".
          NOTES

          mapfile -t assets < <(find release-assets -type f | sort)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets found."
            exit 1
          fi

          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --clobber
            gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --title "Markdown Reader $GITHUB_REF_NAME" --notes-file RELEASE_NOTES.md --latest
          else
            gh release create "$GITHUB_REF_NAME" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --title "Markdown Reader $GITHUB_REF_NAME" --notes-file RELEASE_NOTES.md --latest
          fi
