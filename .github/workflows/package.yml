name: Package and Release Tauri app

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    name: Package ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            artifact-name: markdown-reader-windows-x64
            archive-macos: "false"
            build-command: npm run tauri:build
            bundle-path: |
              src-tauri/target/release/bundle/**/*.exe
              src-tauri/target/release/bundle/**/*.msi
          - name: macOS Intel
            os: macos-15-intel
            artifact-name: markdown-reader-macos-intel
            archive-macos: "true"
            archive-suffix: macos-intel
            build-command: npm run tauri:build -- --bundles app --no-sign
            bundle-path: |
              macos-bundle/*.tar.gz
          - name: macOS Apple Silicon
            os: macos-latest
            artifact-name: markdown-reader-macos-apple-silicon
            archive-macos: "true"
            archive-suffix: macos-apple-silicon
            build-command: npm run tauri:build -- --bundles app --no-sign
            bundle-path: |
              macos-bundle/*.tar.gz

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri bundle
        run: ${{ matrix.build-command }}

      - name: Archive macOS app
        if: matrix.archive-macos == 'true'
        shell: bash
        run: |
          app_path=$(find src-tauri/target/release/bundle/macos -maxdepth 1 -name "*.app" -type d | head -n 1)
          if [ -z "$app_path" ]; then
            echo "No macOS .app bundle found."
            exit 1
          fi

          mkdir -p macos-bundle
          version="${GITHUB_REF_NAME#v}"
          tar -czf "macos-bundle/Markdown-Reader_${version}_${{ matrix.archive-suffix }}.app.tar.gz" -C "$(dirname "$app_path")" "$(basename "$app_path")"

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.bundle-path }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged bundles
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          cat > RELEASE_NOTES.md <<'NOTES'
          ## 中文

          Markdown Reader v0.1.2 是一个偏产品化的本地 Markdown 阅读、编辑和导出版本。

          ### 新增与改进

          - 大纲条目支持点击跳转到对应标题。
          - 编辑器支持插入本地图片，并复制到文章旁边的 assets 文件夹。
          - Word 和 PDF 导出支持图片。
          - PDF 导出内置中文字体，不依赖用户电脑额外安装字体。
          - Word、PDF、HTML 导出完成后会自动打开文件。
          - Markdown 样式选择会实时影响阅读预览和 Word/PDF 导出。
          - 导出面板精简为 Word/PDF 主操作，HTML 输出放到高级区域。
          - 移除公众号宽度阅读 tab，让界面更接近清爽桌面阅读器。

          - Windows x64: `.exe` 和 `.msi`
          - macOS Intel: `.app.tar.gz`
          - macOS Apple Silicon: `.app.tar.gz`

          macOS 版本未做 Apple 签名和公证时，首次打开可能需要在 Finder 中右键应用并选择“打开”。

          ## English

          Markdown Reader v0.1.2 is a more product-ready local Markdown reader, editor, and exporter.

          ### Added and changed

          - Click outline entries to jump to headings.
          - Insert local images into article-adjacent assets folders.
          - Export images in Word and PDF files.
          - Use a bundled Chinese font for PDF export.
          - Open exported Word, PDF, and HTML files automatically.
          - Apply Markdown style presets to both preview and Word/PDF export.
          - Keep Word/PDF as primary export actions and move HTML output into an advanced section.
          - Remove the WeChat-width reading tab for a cleaner desktop reading experience.

          - Windows x64: `.exe` and `.msi`
          - macOS Intel: `.app.tar.gz`
          - macOS Apple Silicon: `.app.tar.gz`

          If the macOS build is not Apple-signed or notarized, first launch may require right-clicking the app in Finder and choosing "Open".
          NOTES

          mapfile -t assets < <(find release-assets -type f | sort)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets found."
            exit 1
          fi

          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --clobber
            gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --title "Markdown Reader $GITHUB_REF_NAME" --notes-file RELEASE_NOTES.md --latest
          else
            gh release create "$GITHUB_REF_NAME" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --title "Markdown Reader $GITHUB_REF_NAME" --notes-file RELEASE_NOTES.md --latest
          fi
